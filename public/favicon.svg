<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0f172a" />
  <g transform="translate(15, 15)">
    <!-- 3x3 Rubik's Cube Stylized Grid -->
    <rect x="0" y="0" width="20" height="20" rx="4" fill="#3b82f6" />
    <rect x="25" y="0" width="20" height="20" rx="4" fill="#ef4444" />
    <rect x="50" y="0" width="20" height="20" rx="4" fill="#10b981" />
    
    <rect x="0" y="25" width="20" height="20" rx="4" fill="#f59e0b" />
    <rect x="25" y="25" width="20" height="20" rx="4" fill="#ffffff" />
    <rect x="50" y="25" width="20" height="20" rx="4" fill="#f59e0b" />
    
    <rect x="0" y="50" width="20" height="20" rx="4" fill="#10b981" />
    <rect x="25" y="50" width="20" height="20" rx="4" fill="#3b82f6" />
    <rect x="50" y="50" width="20" height="20" rx="4" fill="#ef4444" />
  </g>
</svg>
